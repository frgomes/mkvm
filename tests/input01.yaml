apiVersion: v1
kind: MachineDescription
description: A control center intended for cluster management
name: okd10cc
image: centos-1805
vcpus: 1
memory: 4GiB
disks: 
  - 25GiB
  - 20GiB
network:
  domains:
    - okd10.mathminds.io
  nameservers:
    - ns1.he.net
    - ns2.he.net
    - ns3.he.net
    - ns4.he.net
    - ns5.he.net
  interfaces:
    - name: eth0
      mac: 52:54:00:2c:ca:ef
      ipv4: dhcp
      ipv6: dhcp
  ddns:
    strategy: ddns-update
    provider: he.net
    password: 453646433
users:
  - name: rgomes
    gecos: Richard Gomes
    groups: [ users, wheel ]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh-authorized-keys:
      - rgomes
  - name: mgunther
    gecos: Marcio Gunther
    groups: [ users, wheel ]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh-authorized-keys:
      - mgunther
  - name: rudah
    gecos: Robert Udah
    groups: [ users, wheel ]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh-authorized-keys:
      - rudah
  - name: avaz
    gecos: Armindo Vaz
    groups: [ users, wheel ]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh-authorized-keys:
      - avaz
  - name: admin
    gecos: System Administrator
    groups: [ users, wheel ]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: ${lock_password}
    passwd: $(vmtool_mkpasswd)
    ssh-authorized-keys:
      - rgomes
      - mgunther
      - rudah
      - avaz
